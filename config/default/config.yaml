# 天象定时群播（00:00 / 12:00）
weather_broadcast:
  enabled: true
  # all=机器人所在全部群 | selected=仅 group_ids
  mode: selected
  group_ids: []
  # 鹿神赐福时是否向相同目标群播
  bless_broadcast: true
  # 多群推送间隔（毫秒），对齐向日葵早报 delay
  interval_ms: 500

# 日度鹿王加冕 + 职业重置群播（每日 00:00）
king_broadcast:
  enabled: true
  mode: selected
  group_ids: []
  interval_ms: 500
  # 与鹿王同批推送「职业已重置、可转职」文字提醒
  profession_reset: true
