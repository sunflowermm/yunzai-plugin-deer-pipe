# 天象定时群播（00:00 / 12:00）
weather_broadcast:
  enabled: true
  # all=机器人所在全部群 | selected=仅 group_ids
  mode: selected
  group_ids: []
  # 鹿神赐福时是否向相同目标群播
  bless_broadcast: true
  # 多群推送间隔（毫秒），对齐向日葵早报 delay
  interval_ms: 500

# 日度鹿王加冕 + 职业重置群播（每日 00:00）
king_broadcast:
  enabled: true
  mode: selected
  group_ids: []
  interval_ms: 500
  # 与鹿王同批推送「职业已重置、可转职」文字提醒
  profession_reset: true

# 出图（控制台「鹿管配置 → 出图 → 优先预渲染图」）
# - true（默认）：多数场景读 assets/prebuilt/；玩家「鹿皮肤端午 / 王美嘉鹿端午」等会触发实时出图
# - false：全员始终实时 SVG 出图（与是否换皮无关）
# 环境变量 DEER_PIPE_FORCE_LIVE_RENDER=1 等同 prefer_prebuilt: false
render:
  prefer_prebuilt: true
