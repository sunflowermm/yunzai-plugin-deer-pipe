<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{listTitle}}</title>
    <style>
        @font-face {
            font-family: 'Genshin';
            src: url('{{assetFontUrl}}') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: block;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Genshin', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(145deg, #1a3d2e 0%, #2d5a45 40%, #4a7c59 100%);
            min-height: 100vh;
            padding: 28px 20px;
        }
        .wrap {
            max-width: 720px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
        }
        .header {
            background: linear-gradient(135deg, #6b9b7a 0%, #3d6b4f 100%);
            color: #fff;
            text-align: center;
            padding: 22px 16px 18px;
        }
        .header h1 {
            font-size: 22px;
            margin-bottom: 6px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .header .sub {
            font-size: 14px;
            opacity: 0.92;
        }
        .header .count {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 14px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 13px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
            padding: 20px 18px 8px;
        }
        .card {
            text-align: center;
            background: linear-gradient(180deg, #f8fbf8 0%, #eef5ee 100%);
            border: 1px solid #d4e8d4;
            border-radius: 14px;
            padding: 16px 10px 14px;
            position: relative;
        }
        .card::before {
            content: '🍃';
            position: absolute;
            top: 6px;
            right: 8px;
            font-size: 12px;
            opacity: 0.5;
        }
        .card:nth-child(3n+1)::before { content: '🌿'; }
        .card:nth-child(3n+2)::before { content: '🦌'; }
        .card .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #6b9b7a;
            box-shadow: 0 4px 12px rgba(61, 107, 79, 0.25);
        }
        .card .badge {
            display: inline-block;
            margin-top: 8px;
            padding: 2px 10px;
            font-size: 11px;
            color: #2d5a45;
            background: #d4edda;
            border-radius: 10px;
        }
        .card .name {
            margin-top: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 4px;
        }
        .tips {
            padding: 14px 18px 18px;
            font-size: 12px;
            color: #7a8b7a;
            text-align: center;
            line-height: 1.6;
            border-top: 1px dashed #e0ebe0;
            margin-top: 8px;
        }
        .footer {
            background: #f5faf5;
            text-align: center;
            padding: 10px;
            font-size: 11px;
            color: #aab8aa;
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="header">
        <h1>🌳 {{myNickName}} · {{listTitle}} 🦌</h1>
        <div class="sub">一次添加 · 双向结缘 · 互助帮🦌/帮戒🦌/救活</div>
        <div class="count">共 {{friendCount}} 位🦌友</div>
    </div>
    <div class="grid">
        {{each friendsData deer}}
        <div class="card">
            <img class="avatar" src="{{deer.avatar}}" alt="">
            <div class="name">{{deer.nickname}}</div>
            <span class="badge">{{deer.badge}}</span>
        </div>
        {{/each}}
    </div>
    <div class="tips">
        帮🦌 · 帮戒🦌 · 同归鹿尽 · 救活<br>
        绝交🦌友@某人 可解除双向关系
    </div>
    <div class="footer">yunzai-plugin-deer-pipe · 向日葵维护版</div>
</div>
</body>
</html>
