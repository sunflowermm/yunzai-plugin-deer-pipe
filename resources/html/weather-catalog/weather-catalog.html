<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        @font-face {
            font-family: 'Genshin';
            src: url('{{assetFontUrl}}') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: block;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Genshin', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #d0e8ff 0%, #e8f4ff 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .wrap {
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.92);
            border: 2px dashed rgba(49, 130, 206, 0.35);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 32px rgba(26, 58, 92, 0.12);
        }
        .header {
            text-align: center;
            padding: 22px 16px 14px;
            background: linear-gradient(135deg, #e8f4ff 0%, #d0e8ff 100%);
            border-bottom: 1px solid rgba(49, 130, 206, 0.15);
        }
        .header h1 {
            font-size: 24px;
            color: #1a3a5c;
            margin-bottom: 8px;
        }
        .header .sub {
            font-size: 14px;
            color: #2c5282;
        }
        .list { padding: 8px 12px 12px; }
        .row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            margin-bottom: 6px;
            border-radius: 10px;
            border: 2px solid transparent;
        }
        .row.active {
            background: rgba(49, 130, 206, 0.18);
            border-color: #3182ce;
        }
        .emoji { font-size: 20px; line-height: 1.4; flex-shrink: 0; }
        .main { flex: 1; min-width: 0; }
        .title-line {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }
        .name {
            font-size: 17px;
            font-weight: bold;
            color: #1a3a5c;
        }
        .weight {
            font-size: 13px;
            color: #4a5568;
            white-space: nowrap;
        }
        .tip {
            font-size: 13px;
            color: #2c5282;
            line-height: 1.45;
        }
        .footer {
            text-align: center;
            padding: 10px 12px 16px;
            color: #4a5568;
            font-size: 12px;
            line-height: 1.6;
            border-top: 1px solid rgba(49, 130, 206, 0.12);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="header">
            <h1>🌤 {{title}}</h1>
            <div class="sub">{{subtitle}}</div>
        </div>
        <div class="list">
            {{each rows row}}
            <div class="row{{if row.active}} active{{/if}}">
                <div class="emoji">{{row.emoji}}</div>
                <div class="main">
                    <div class="title-line">
                        <span class="name">{{row.name}}{{if row.active}} · 当前{{/if}}</span>
                        <span class="weight">权重 {{row.weight}}</span>
                    </div>
                    <div class="tip">{{row.tip}}</div>
                </div>
            </div>
            {{/each}}
        </div>
        <div class="footer">
            <div>{{footer1}}</div>
            <div>{{footer2}}</div>
        </div>
    </div>
</body>
</html>
